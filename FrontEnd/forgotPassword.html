<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="RegStyle.css">
    <title>Sign Up</title>
</head>

<body>

    <div id="registerContainer">
        <h2>Reset Password</h2>

        <br>

        <form id="registerForm">
            <label for="email">Email:</label> <br>
            <input type="email" name="email" ngModel [email]="true" id="email" name="email" placeholder="AbdelWahab@example.com" required>
            <br>
            <label for="password">New Password:</label> <br>
            <input type="password" id="password" name="password" placeholder="Salamo3alekom" required>
            <label for="confirm-password">Re-enter new Password:</label> <br>
            <input type="confirm-password" id="reentpassword" name="password" placeholder="Salamo3alekom" required>
            <br>
            <button type="submit">Log In</button>
            <br>

            <hr>

            <a href="register.html">Don't have an account?</a>
        </form>

    </div>

</body>

</html>
