<div class="commonContainer">
  <img id="logo" src="./logo.png">
  <hr class="styled-separator">
  <h2>Sign In</h2>

  <br>
  @if (errorMessage) {
  <div class="error-box">
    {{ errorMessage }}
  </div>
  }

  <form id="registerForm" #f="ngForm" (ngSubmit)="onSubmit(f.value)">
    <label for="username" class="inputLabel">Username:</label>
    <input type="text" class="inputField" [(ngModel)]="username" id="username" name="username"
      placeholder="Enter your username" required>

    <label for="password" class="inputLabel">Password:</label>
    <input type="password" class="inputField" id="password" [(ngModel)]="password" name="password"
      placeholder="Enter your password" required>
    <button type="button" [disabled]="isNotValid(f)" class="commonButtonTheme" id="LogInButton" (click)="signIn()">Log
      In</button>


    <div class="thirdPartyContainer">
      <div id="googleBtn" class="thirdPartyButton"></div>
    </div>

    <div class="noSignIn">
      <a routerLink="/set-email">Forgot Password?</a>
      <a routerLink="/register">Don't have an account?</a>
    </div>
  </form>

  <!-- <script src="https://apis.google.com/js/platform.js" async defer></script> -->

</div>
