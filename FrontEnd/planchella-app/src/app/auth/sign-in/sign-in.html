<div class="commonContainer">
  <h2>Sign In</h2>

  <br>

  <form id="registerForm" #f ="ngForm" (ngSubmit)="onSubmit(f.value)">
    <label for="email" class="inputLabel">Email:</label>
    <input type="email"
           class="inputField"
           [(ngModel)]="email"
           [email] = true
           id="email"
           name="email"
           placeholder="AbdelWahab@example.com"
           required>

    <label for="password" class="inputLabel">Password:</label>
    <input type="password"
           class="inputField"
           id="password"
           [(ngModel)]="password"
           name="password"
           placeholder="Salamo3alekom"
           required>
    <button type="button"

            class="commonButtonTheme"
            id="LogInButton"
            (click)="signIn()">Log In</button>


    <div class="thirdPartyContainer">
      <button type="submit" class="thirdParty">Google</button>
      <button type="submit" class="thirdParty">Microsoft</button>
    </div>

    <div class="noSignIn">
      <a routerLink="/set-email">Forgot Password?</a>
      <a routerLink="/register">Don't have an account?</a>
    </div></form>

</div>
