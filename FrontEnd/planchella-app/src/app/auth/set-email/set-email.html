<div class="commonContainer" id="registerContainer">
  <h2>Set your e-mail</h2>

  <form id="registerForm" #f="ngForm" (ngSubmit)="onSubmit(f)">
    <div id="getEmail">
      <label for="email"
             class="inputLabel">
        Enter your Email:
      </label>
      <input type="email"
             class="inputField"
             name="email"
             [(ngModel)]="email"
             [email]="true"
             id="email"
             placeholder="AbdelWahab@example.com"
             required>
      <br><br>
      <button type="submit"
              [disabled]="isEmailNotValid(f)"
              class="commonButtonTheme">Submit</button>
    </div>
    <a routerLink="[/signin]">Back to Login</a>
  </form>

</div>
