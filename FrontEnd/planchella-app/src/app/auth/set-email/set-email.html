<div id="registerContainer">
  <h2>Set you e-mail</h2>

  <br>

  <form id="registerForm" #f="ngForm" (ngSubmit)="onSubmit(f)">
    <div id="getEmail">
      <label for="email">Enter your Email:</label> <br>
      <input type="email" name="email" ngModel [email]="true" id="email" placeholder="AbdelWahab@example.com" required>
      <br>
      <button type="submit">Submit</button>
    </div>
    <a routerLink="[/signin]">Back to Login</a>
  </form>

</div>
