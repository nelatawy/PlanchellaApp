<div class="card" id="resetPasswordCard">
    <p class="card-title">Reset Password</p>
    <form #f="ngForm" (ngSubmit)="onSubmit(f)">
        <div id="setNewPassword" class="card-body">
            <label for="setPassword">Enter new password:</label> <br />
            <input type="password" name="setPassword" id="setPassword" placeholder="Enter Password Here" required />
            <br />
            <label for="confirmPassword">Confirm password:</label> <br />
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Enter Password Here"
                required />
        </div>
        <button type="submit" class="btn btn-primary" routerLink="/login">Submit</button>
    </form>
</div>
