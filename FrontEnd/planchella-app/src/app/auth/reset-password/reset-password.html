<div class="commonContainer" id="resetPasswordCard">
  <h2>Reset Your Password</h2>
    <form #f="ngForm" (ngSubmit)="onSubmit(f)" id="formMaster">
          <label for="setPassword" class="inputLabel">Enter new password:</label>
            <input type="password"
                   class="inputField"
                   [(ngModel)]="password"
                   name="setPassword"
                   id="setPassword"
                   placeholder="Enter your password"
                   required />
          <label for="confirmPassword" class="inputLabel">
            Confirm password:
          </label>
          <input type="password"
                 class="inputField"
                 [(ngModel)]="confirmPassword"
                 name="confirmPassword"
                 id="confirmPassword"
                 placeholder="Confirm the password"
              required />

            @if (this.confirmPassword && passwordsDontMatch()) {
              <p>
                Passwords don't match
              </p>
            }

        <button type="submit"
                [disabled]="passwordsDontMatch()"
                class="commonButtonTheme">Submit</button>
    </form>
</div>
