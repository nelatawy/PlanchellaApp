<div class="top-section">
  <img class="pfp" ngSrc="/profile_placeholder.png" alt="Profile Picture" height="500" width="500">

  <div class="user-info">
    <h2>{{ user!.name }}</h2>
    <h3>{{ user!.bio }}</h3>

    <div class="icon-text">
      <img ngSrc="/organization-icon.svg" alt="Education" height="16" width="16">
      <span>{{ user!.education }}</span>
    </div>

    <div class="icon-text">
      <img ngSrc="/location-icon.svg" alt="Location" height="16" width="16">
      <span>{{ user!.address }}</span>
    </div>

    <div class="icon-text">
      <img ngSrc="/email-icon.svg" alt="Email" height="16" width="16">
      <span>{{ user!.email }}</span>
    </div>
  </div>
</div>

<button class="logout-button" (click)="logout()">
  <i class="fa-solid fa-right-from-bracket"></i>
  <span>Logout</span>
</button>
