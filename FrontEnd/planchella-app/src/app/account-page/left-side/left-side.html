<img class="pfp" ngSrc="/profile_placeholder.png" alt="" height="500" width="500">
  <div class="user-info">
    <h2>{{ user!.name }}</h2>
    <h3> {{user!.bio}} </h3>
    <div class="icon-text">
      <img ngSrc="/organization-icon.svg" alt="" height="16" width="16">
      {{user!.education}}
    </div>
    <div class="icon-text">
      <img ngSrc="/location-icon.svg" alt="" height="16" width="16">
      {{user!.address}}
    </div>
    <div class="icon-text">
      <img ngSrc="/email-icon.svg" alt="" height="16" width="16">
      {{user!.email}}
    </div>
  </div>
