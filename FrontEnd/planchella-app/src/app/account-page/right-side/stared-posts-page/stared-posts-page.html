@if (isLoading && events.length === 0) {
<div class="loading-container">
    <div class="spinner"></div>
    <p>Loading your starred events...</p>
</div>
}

@if (error) {
<div class="error-container">
    <p class="error-message">{{ error }}</p>
</div>
}

@if (!isLoading && events.length === 0 && !error) {
<app-empty-page iconSrc="/star-icon.svg" title="You haven't starred any events yet!"
    sub_title="Explore communities and star events you like" />
}

@if (events.length > 0) {
<div class="events-container">
    @for (event of events; track event.event.id) {
    <app-event-card [displayData]="event"></app-event-card>
    }
</div>
}

@if (isLoading && events.length > 0) {
<div class="loading-more">
    <div class="spinner-small"></div>
    <span>Loading more...</span>
</div>
}
