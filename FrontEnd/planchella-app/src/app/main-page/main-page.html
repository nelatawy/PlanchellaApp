<div id="main">
  <top-bar class="top-bar"></top-bar>
  <div class="page-content">
    <app-community-selector class="comm_selector" [class.open]="isOpen" (selection)="select_community($event)"></app-community-selector>
    <app-billboard [communityData]="communityData" class="billboard" [class.full]="!isOpen" [class.shrink]="isOpen"></app-billboard>
  </div>
  <button class="new_event fa-solid fa-plus" (click)="show_creation_page()"></button>
  <div #overlay class="overlay" (click)="hide_creation_page()">
    <app-event-builder #builder class="builder" (click)="onBuilderClick($event)" (close)="hide_creation_page()"></app-event-builder>
  </div>
</div>
