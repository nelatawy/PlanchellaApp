<div id="main">
  <top-bar class="top-bar" (eventSearch)="onEventSearch($event)" (communitySearch)="onCommunitySearch($event)">
  </top-bar>
  <div class="page-content">
    <app-community-selector class="comm_selector" [class.open]="isOpen" (selection)="select_community($event)"
      (openBuilder)="show_community_builder()">
    </app-community-selector>

    <app-billboard [communityData]="communityData" class="billboard" [class.full]="!isOpen" [class.shrink]="isOpen"
      (eventSelected)="show_event_details($event)"></app-billboard>
  </div>

  <button class="new_event fa-solid fa-plus" (click)="show_creation_page()"></button>

  <div #overlay class="overlay" (click)="hide_creation_page()">
    <app-event-builder [currentlySelectedCommunity]="communityData" #builder class="builder event"
      (click)="onBuilderClick($event)" (close)="hide_creation_page()" (eventCreated)="onEventCreated()"></app-event-builder>
  </div>

  <div #communityOverlay class="overlay" (click)="hide_community_builder()">
    <div class="community-builder" (click)="$event.stopPropagation()">
      <app-community-builder #communityBuilder (cancel)="hide_community_builder()"
        (communityCreated)="onCommunityCreated()">
      </app-community-builder>
    </div>
  </div>

  <div class="overlay" [class.visible]="isEventDetailsOpen" (click)="hide_event_details()">
    <div class="event-details-container" (click)="$event.stopPropagation()">
      @if (isEventDetailsOpen) {
      <app-event [eventId]="selectedEventId"></app-event>
      }
    </div>
  </div>


</div>
