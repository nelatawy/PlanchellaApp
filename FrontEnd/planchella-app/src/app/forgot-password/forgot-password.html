<div id="registerContainer">
  <h2>Reset Password</h2>

  <br>

  <form id="registerForm">
    <div id="getEmail">
      <label for="email">Enter your Email:</label> <br>
      <input type="email" name="email" ngModel [email]="true" id="email" placeholder="AbdelWahab@example.com" required>
      <br>
      <button type="submit">Submit</button>
    </div>

    <div id="setNewPassword">
      <label for="setPassword">Enter new password:</label> <br>
      <input type="password" name="setPassword" id="setPassword" placeholder="Enter Password Here" required>
      <br>
      <label for="confirmPassword">Confirm password:</label> <br>
      <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Enter Password Here" required>
    </div>
    <div>
      <a routerLink="signin">Already have an account?</a>
    </div>
  </form>

</div>
