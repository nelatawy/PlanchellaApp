<div id="card" [class] = "eventSize" >
  <div id="top-bar">
    <app-profile-pic
    [hover_text]="userName"></app-profile-pic>
    <p>{{title}}</p>
    <p>{{creationDate}}</p>
  </div>

  <div id="content">
    <div id="image_container">
      <img src="/favicon.ico"
           alt="hamada">
    </div>
    <div id="description">{{description | slice:25}}</div>
  </div>

  <div id="bottom-bar">
    <button>{{ upVote }}</button>
    <button>{{ downVote }}</button>
    <button>{{ star }}</button>
  </div>
</div>
