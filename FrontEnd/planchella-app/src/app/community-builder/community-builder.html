<div class="builder-modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
        <h3>Create a Community</h3>
        <button class="close-btn" (click)="onCancel()">
            <i class="fa-solid fa-xmark"></i>
        </button>
    </div>

    <div class="modal-body">
        <div class="form-group">
            <label>Community Name</label>
            <input type="text" [(ngModel)]="name" placeholder="e.g. Hiking Enthusiasts" autofocus>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea [(ngModel)]="description" rows="4" placeholder="What is this community about?"></textarea>
        </div>
    </div>

    <div class="modal-footer">
        <button class="btn-cancel" (click)="onCancel()">Cancel</button>
        <button class="btn-create" (click)="createCommunity()" [disabled]="!name.trim() || isSubmitting">
            @if (isSubmitting) {
            <div class="spinner-mini"></div>
            }
            @else {
            Create
            }
        </button>
    </div>
