<div class="builder-modal" (click)="$event.stopPropagation()">

  <!-- Header -->
  <div class="modal-header">
    <h2>Create Community</h2>
    <button class="close-btn" (click)="onCancel()" aria-label="Close">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <!-- Body -->
  <div class="modal-body">
    <p class="modal-subtitle">
      Bring people together around a shared interest.
    </p>

    <div class="form-group">
      <label for="community-name">Community Name</label>
      <input
        id="community-name"
        type="text"
        [(ngModel)]="name"
        placeholder="e.g. Hiking Enthusiasts"
        autofocus
      />
    </div>

    <div class="form-group">
      <label for="community-description">Description</label>
      <textarea
        id="community-description"
        [(ngModel)]="description"
        rows="3"
        placeholder="What is this community about?"
      ></textarea>
    </div>
  </div>

  <!-- Footer -->
  <div class="modal-footer">
    <button class="btn-cancel" (click)="onCancel()">Cancel</button>

    <button
      class="btn-create"
      (click)="createCommunity()"
      [disabled]="!name.trim() || isSubmitting"
    >
      <span>Create Community</span>

      @if (isSubmitting) {
        <div class="spinner-mini"></div>
      }
    </button>
  </div>

</div>
