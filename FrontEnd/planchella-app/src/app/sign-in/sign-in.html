<div id="registerContainer">
  <h2>Sign In</h2>

  <br>

  <form id="registerForm">
    <label for="email">Email:</label> <br>
    <input type="email" id="email" name="email" placeholder="AbdelWahab@example.com" required>
    <br>
    <label for="password">Password:</label> <br>
    <input type="password" id="password" name="password" placeholder="Salamo3alekom" required>
    <br>
    <button type="submit">Log In</button>
    <br>

    <!--- add forgot password file link -->
    <a routerLink="/forgot-password">Forgot Password?</a>
    <br>

    <hr>

    <div class="thirdPartyContainer">
      <button type="submit" class="thirdParty">Log In with Google</button>
      <button type="submit" class="thirdParty">Log In with Microsoft</button>
    </div>

    <a routerLink="/register">Don't have an account?</a>
  </form>

</div>
