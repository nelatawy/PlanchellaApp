<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="RegStyle.css">
    <title>Sign Up</title>
</head>
 
<body>

    <div id="registerContainer">
        <h2>Sign Up</h2>

        <br>

        <form id="registerForm">
            <label for="name">Name:</label> <br>
            <input type="text" id="name" name="name" placeholder="AbdelGhafour" required>
            <br>
            <label for="email">Email:</label> <br>
            <!-- email validation from Angular -->
            <input type="email" name="email" ngModel [email]="true" id="email" name="email" placeholder="AbdoBora3y@example.com" required>
            <br>
            <label for="password">Password:</label> <br>
            <input type="password" id="password" name="password" placeholder="FatmaKoshary" required>
            <br>
            <label for="confirmPassword">Confirm Password:</label> <br>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="FatmaKoshary" required>
            <br>
            <button type="submit">Register</button>
            <br>
            <hr>
            <div class="relatedTagsContainer">
                <div class="thirdPartyContainer">
                    <button type="submit" class="thirdParty">Register with Google</button>
                    <button type="submit" class="thirdParty">Register with Microsoft</button>
                </div>
                <br>
                <a href="signIn.html">Already have an account?</a>
            </div>
            
        </form>

    </div>

</body>

</html>
