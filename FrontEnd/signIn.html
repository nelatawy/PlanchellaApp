<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="RegStyle.css">
    <title>Sign Up</title>
</head>

<body>

    <div id="registerContainer">
        <h2>Sign In</h2>

        <br>

        <form id="registerForm">
            <label for="email">Email:</label> <br>
            <input type="email" id="email" name="email" placeholder="AbdelWahab@example.com" required>
            <br>
            <label for="password">Password:</label> <br>
            <input type="password" id="password" name="password" placeholder="Salamo3alekom" required>
            <br>
            <button type="submit">Log In</button>
            <br>

            <!--- add forgot password file link -->
            <a href="forgotPassword.html">Forgot Password?</a>
            <br>

            <hr>

            <div class="thirdPartyContainer">
                <button type="submit" class="thirdParty">Log In with Google</button>
                <button type="submit" class="thirdParty">Log In with Microsoft</button>
            </div>

            <a href="register.html">Don't have an account?</a>
        </form>

    </div>

</body>

</html>
