<div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #E5E7EB;">
    <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 15px; color: #1F2937;">📍 Event Location</h3>
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation"
        style="background-color: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px;">
        <tr>
            <td align="center" style="padding: 15px;">
                <img src="{{map_url}}" alt="Event Location"
                    style="width: 100%; max-width: 550px; height: auto; border-radius: 4px; display: block;" />
            </td>
        </tr>
        <tr>
            <td align="center" style="padding: 0 15px 10px 15px; font-size: 14px; color: #374151;">
            </td>
        </tr>
        <tr>
            <td align="center" style="padding: 0 15px 15px 15px;">
                <a href="{{google_maps_url}}" target="_blank"
                    style="font-size: 14px; color: #7E30E1; font-weight: 600; text-decoration: underline;">
                    Open in Google Maps
                </a>
            </td>
        </tr>
    </table>
</div>
